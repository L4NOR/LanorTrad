[build]
publish = "."  # Le dossier racine contient tes fichiers HTML

[build.environment]
IMAGE_VERSION = "jammy"  # Pour éviter l'image "Focal" dépréciée

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.google-analytics.com https://pagead2.googlesyndication.com https://5gvci.com https://*.disqus.com https://*.disquscdn.com https://cdn.onesignal.com https://onesignal.com; worker-src 'self' https://cdn.onesignal.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://*.disquscdn.com; img-src 'self' data: https://i.postimg.cc https://*.google-analytics.com https://*.googletagmanager.com https://*.disquscdn.com https://referrer.disqus.com https://img.onesignal.com; font-src 'self' data: https://*.disquscdn.com; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://*.disqus.com https://onesignal.com https://*.onesignal.com https://*.one.service.notification; frame-src 'self' https://pagead2.googlesyndication.com https://disqus.com https://*.disqus.com https://onesignal.com; object-src 'none'; base-uri 'self'"
