    <script>
document.addEventListener('DOMContentLoaded', function() {
    const chaptersGrid = document.getElementById('chaptersGrid');
    const startChapter = 142;
    const endChapter = 150;

    for (let i = startChapter; i <= endChapter; i++) {
        const chapterButton = document.createElement('button');
        chapterButton.classList.add('chapter-button');
        chapterButton.textContent = `Chapitre ${i}`;
        chapterButton.addEventListener('click', () => {
            window.location.href = `Tome 17/Chapitre ${i}.html`; 
        });
        chaptersGrid.appendChild(chapterButton);
    }
});

    </script>
