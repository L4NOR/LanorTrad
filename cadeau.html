<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="https://www.creativefabrica.com/wp-content/uploads/2019/03/Monogram-LT-Logo-Design-by-Greenlines-Studios-580x387.jpg">
  <style>
:root {
  --primary-color: #2C3E50;
  --accent-color: #E74C3C;
  --gold: #FFD700;
  --snow-white: #F9F9F9;
  --grid-cols: 6;
  --grid-rows: 4;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1a2a6c, #2a3d8c);
  font-family: 'Montserrat', sans-serif;
  overflow-y: auto;
  position: relative;
  padding: 20px;
}

/* Snowflake Animation */
.snowflake {
  position: fixed;
  color: white;
  font-size: 1.5em;
  filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
  animation: fall linear infinite;
  z-index: 1;
}

@keyframes fall {
  0% {
    transform: translateY(-100vh) rotate(0deg) scale(0.8);
  }
  50% {
    transform: translateY(50vh) rotate(180deg) scale(1.2);
  }
  100% {
    transform: translateY(100vh) rotate(360deg) scale(0.8);
  }
}

/* Past Days Styling */
.calendar-door.past {
  opacity: 0.5;
  cursor: not-allowed;
}

.calendar-door.past .door-front {
  background: linear-gradient(135deg, #7f8c8d, #95a5a6);
}

.calendar-door.past .door-front::before {
  display: none;
}

.calendar-door.past .ribbon {
  background: #95a5a6;
}

.calendar-door.past .door-back {
  background: none;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.calendar-door.past .door-back img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
}

/* Christmas Lights */
.lights {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  padding: 20px;
  z-index: 2;
  filter: blur(1px);
}

.light {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
  box-shadow: 0 0 15px currentColor;
}

@keyframes twinkle {
  0% { 
    opacity: 0.3;
    transform: scale(0.8);
  }
  100% { 
    opacity: 1;
    transform: scale(1.2);
  }
}

/* Calendar Container */
.calendar-container {
  width: 90vw;
  max-width: 1200px;
  margin: 20px;
  perspective: 2000px;
  position: relative;
  z-index: 3;
}

/* Calendar Title */
.calendar-title {
  text-align: center;
  color: var(--snow-white);
  font-size: 3em;
  margin-bottom: 30px;
  text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
  position: relative;
  animation: titleGlow 3s infinite alternate;
}

@keyframes titleGlow {
  0% {
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
  }
  100% {
    text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
  }
}

/* Calendar Grid */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(var(--grid-cols), 1fr);
  grid-template-rows: repeat(var(--grid-rows), 1fr);
  gap: 20px;
  aspect-ratio: calc(var(--grid-cols) / var(--grid-rows));
  width: 100%;
  background: rgba(255, 255, 255, 0.1);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(10px);
}

/* Calendar Door */
.calendar-door {
  position: relative;
  background: white;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
}

.calendar-door:hover {
  transform: scale(1.1) translateZ(20px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
}

.door-front, .door-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 12px;
  font-size: 2.5em;
  font-weight: bold;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.door-front {
  background: linear-gradient(135deg, var(--accent-color), #c0392b);
  color: var(--snow-white);
  z-index: 2;
  overflow: hidden;
}

.door-front::before {
  content: '';
  position: absolute;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
  animation: shimmer 3s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%) translateY(-100%); }
  100% { transform: translateX(100%) translateY(100%); }
}

.door-back {
  background: linear-gradient(135deg, #27ae60, #2ecc71);
  transform: rotateY(180deg);
  color: var(--snow-white);
}

.ribbon {
  position: absolute;
  top: -15px;
  right: -15px;
  width: 40px;
  height: 40px;
  background: var(--gold);
  transform: rotate(45deg);
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  animation: ribbonSway 3s ease-in-out infinite;
}

@keyframes ribbonSway {
  0%, 100% { transform: rotate(45deg) scale(1); }
  50% { transform: rotate(50deg) scale(1.1); }
}

.calendar-door.open .door-front {
  transform: rotateY(180deg);
}

.calendar-door.open .door-back {
  transform: rotateY(0deg);
}

/* Transition Overlay */
.transition-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, transparent, rgba(0, 0, 0, 0.95));
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.5s ease;
  z-index: 1000;
}

.transition-active {
  opacity: 1;
  pointer-events: all;
}

/* Gift Container */
.gift-container {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0) rotate(-10deg);
  width: 80vw;
  max-width: 600px;
  aspect-ratio: 1;
  background: rgba(255, 255, 255, 0.98);
  border-radius: 20px;
  z-index: 1001;
  transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 30px;
  box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
}

.gift-visible {
  transform: translate(-50%, -50%) scale(1) rotate(0deg);
}

.gift-content {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  animation: giftPulse 2s infinite;
}

@keyframes giftPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

.gift-content img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 15px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.1);
  transition: transform 0.3s ease;
}

.gift-link:hover img {
  transform: scale(1.05);
}

.gift-link {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
  text-decoration: none;
  cursor: pointer;
}

/* Responsive Design Breakpoints */
@media (max-width: 1200px) {
  .calendar-container {
    width: 95vw;
  }

  .calendar-grid {
    gap: 15px;
    padding: 25px;
  }
}

@media (max-width: 992px) {
  .calendar-grid {
    --grid-cols: 4;
    --grid-rows: 6;
    gap: 12px;
    padding: 20px;
  }

  .calendar-title {
    font-size: 2.5em;
  }

  .door-front, .door-back {
    font-size: 2em;
  }
}

@media (max-width: 768px) {
  .calendar-grid {
    --grid-cols: 3;
    --grid-rows: 8;
    gap: 10px;
    padding: 15px;
  }

  .calendar-title {
    font-size: 2em;
  }

  .door-front, .door-back {
    font-size: 1.5em;
  }

  .lights {
    padding: 10px;
  }

  .light {
    width: 15px;
    height: 15px;
  }
}

@media (max-width: 576px) {
  .calendar-grid {
    --grid-cols: 2;
    --grid-rows: 12;
    gap: 8px;
    padding: 10px;
  }

  .calendar-title {
    font-size: 1.6em;
  }

  .door-front, .door-back {
    font-size: 1.2em;
  }

  .gift-container {
    width: 90vw;
    padding: 15px;
  }

  .lights {
    padding: 5px;
  }

  .light {
    width: 12px;
    height: 12px;
  }
}

@media (max-width: 380px) {
  body {
    padding: 10px;
  }

  .calendar-grid {
    gap: 5px;
    padding: 5px;
  }

  .calendar-title {
    font-size: 1.4em;
    margin-bottom: 15px;
  }

  .door-front, .door-back {
    font-size: 1em;
  }
}
  </style>
</head>
<body>
  
  <div class="lights"></div>

  <div class="calendar-container">
    <h1 class="calendar-title" id="calendrier-de-lanortrad">Calendrier de LanorTrad</h1>
    <div class="calendar-grid"></div>
  </div>

  <div class="transition-overlay"></div>

  <div class="gift-container">
    <div class="gift-content">
      <a href="wild strawberry/Chapitre 6.html" class="gift-link" target="_blank">
        <img src="images/cadeaux/4.png" alt="Cadeau du jour" style="align-items: center;">
      </a>
    </div>
  </div>

  <script>
    // Configuration du calendrier
    const pastDays = [1, 2, 3, 4, 5, 6, 7, 8, 9]; // Jours déjà passés
    const currentOpenDay = 10; // Jour actuellement ouvert

    // Création des flocons améliorée
    function createSnowflakes() {
      const snowflakes = ["❄", "❅", "❆"];
      for (let i = 0; i < 40; i++) {
        const snowflake = document.createElement("div");
        snowflake.className = "snowflake";
        snowflake.textContent = snowflakes[Math.floor(Math.random() * snowflakes.length)];
        snowflake.style.left = `${Math.random() * 100}vw`;
        snowflake.style.animationDuration = `${Math.random() * 5 + 3}s`;
        snowflake.style.opacity = Math.random() * 0.7 + 0.3;
        snowflake.style.fontSize = `${Math.random() * 1 + 0.8}em`;
        document.body.appendChild(snowflake);
      }
    }

    // Création des lumières améliorée
    function createLights() {
      const lights = document.querySelector(".lights");
      const colors = ["#ff0000", "#00ff00", "#ffff00", "#0000ff", "#ff00ff", "#00ffff"];
      for (let i = 0; i < 30; i++) {
        const light = document.createElement("div");
        light.className = "light";
        light.style.backgroundColor = colors[i % colors.length];
        light.style.animationDelay = `${Math.random() * 2}s`;
        lights.appendChild(light);
      }
    }

    // Fonction d'animation du cadeau
    function animateGift(door) {
      const overlay = document.querySelector(".transition-overlay");
      const giftContainer = document.querySelector(".gift-container");

      overlay.classList.add("transition-active");
      
      setTimeout(() => {
        giftContainer.classList.add("gift-visible");
        
        setTimeout(() => {
          overlay.classList.remove("transition-active");
          
          setTimeout(() => {
            giftContainer.classList.remove("gift-visible");
          }, 3000);
        }, 4000);
      }, 1000);
    }

    // Initialisation du calendrier avec animations améliorées
    document.addEventListener("DOMContentLoaded", () => {
      const calendarGrid = document.querySelector(".calendar-grid");
      calendarGrid.innerHTML = "";

      for (let day = 1; day <= 24; day++) {
        const door = document.createElement("div");
        door.className = "calendar-door";
        door.setAttribute("data-day", day);

        // Vérifier si le jour est dans les jours passés
        if (pastDays.includes(day)) {
          door.classList.add("past");
        }

        door.innerHTML = `
          <div class="door-front">
            ${day}
            <div class="ribbon"></div>
          </div>
          <div class="door-back">🎁</div>
        `;

        door.addEventListener("click", function() {
          // Si le jour est déjà passé, ne rien faire
          if (this.classList.contains("past")) {
            return;
          }

          // Comportement normal pour les autres jours
          if (day === currentOpenDay && !this.classList.contains("open")) {
            this.classList.add("open");
            animateGift(this);
          }
        });

        if (day === currentOpenDay) {
          door.classList.add("open");
          setTimeout(() => animateGift(door), 1000);
        }

        calendarGrid.appendChild(door);
      }
    });

    // Initialisation des décorations
    createSnowflakes();
    createLights();

    // Renouvellement des flocons avec transition
    setInterval(() => {
      const oldSnowflakes = document.querySelectorAll(".snowflake");
      oldSnowflakes.forEach(s => {
        s.style.opacity = "0";
        setTimeout(() => s.remove(), 1000);
      });
      setTimeout(createSnowflakes, 500);
    }, 15000);
  </script>
</body>
